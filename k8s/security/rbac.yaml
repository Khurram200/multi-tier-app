# Frontend tier: read only its ConfigMap — no Secret access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-app-role
  namespace: acme-todo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["frontend-configmap"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-app-binding
  namespace: acme-todo
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: acme-todo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: frontend-app-role
---
# Backend tier: read database Secret only — no ConfigMap or cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-app-role
  namespace: acme-todo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["db-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-app-binding
  namespace: acme-todo
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: acme-todo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-app-role
---
# Database tier: read only its PVC (status/troubleshooting).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: database-app-role
  namespace: acme-todo
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    resourceNames: ["db-pvc"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: database-app-binding
  namespace: acme-todo
subjects:
  - kind: ServiceAccount
    name: database-sa
    namespace: acme-todo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: database-app-role
---
# Prometheus: discover and scrape pods/services in this namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-scrape-role
  namespace: acme-todo
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["prometheus-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-scrape-binding
  namespace: acme-todo
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: acme-todo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-scrape-role
