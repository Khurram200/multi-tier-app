apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: acme-todo
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: acme-todo
        orgId: 1
        folder: ACME Todo
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backend
  namespace: acme-todo
  labels:
    app: grafana
data:
  backend-metrics.json: |
    {
      "title": "ACME Todo - Backend HTTP",
      "uid": "acme-backend-http",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP requests rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"acme-todo\"}[1m])) by (method, route)",
              "legendFormat": "{{method}} {{route}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "type": "timeseries",
          "title": "Process CPU (backend pod)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"backend\"}[1m])",
              "legendFormat": "cpu"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "type": "stat",
          "title": "Total requests (backend)",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"backend\"})",
              "legendFormat": "total"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        }
      ]
    }
